user nginx;
worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 75s;

    # 업로드 카드뉴스 이미지/영상 — 넉넉히
    client_max_body_size 50m;

    # SSE 응답을 절대 버퍼링하지 않도록 디폴트를 미리 깐다. (per-location도 한 번 더 강조)
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_http_version 1.1;

    upstream backend  { server backend:8000;  keepalive 16; }
    upstream frontend { server frontend:3000; keepalive 16; }

    server {
        listen 80 default_server;
        server_name _;

        # ---- SSE 스트림: 버퍼링 OFF, 타임아웃 길게 ----
        # 에이전트 5단계 도는 동안 connection을 열어둬야 한다.
        location ~ ^/api/review/[^/]+/stream$ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
            chunked_transfer_encoding on;

            # nginx가 X-Accel-Buffering 헤더로 백엔드에 hint하는 것도 차단되게
            add_header X-Accel-Buffering no always;
        }

        # ---- 나머지 API (업로드/리포트/스냅샷/콘텐츠) ----
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ---- Next.js (정적 + SSR + 핫리로드 없는 prod) ----
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ALB/CloudFront health check 용
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
