# Deterministic compliance rules — JB 본업(대출·예금·외국인) 중심 매핑.
#
# regulation_id ↔ rule 매핑 (data/regulations/README.md 매핑표 기준):
#   1. 일 단위 금리 오인 표시          → 금소법-제22조-대출성상품-광고
#   2. 외국어 중요사항 누락(대출)       → 금소법-제19조-설명의무
#   3. 무조건/100%/확정 단정·과장 표현  → 금소법-제21조-부당권유금지
#   4. 예금 최고 우대금리만 강조       → 금소법-제22조-예금성상품-광고
#   5. 사실 근거 없는 긴급성 강조      → 금소법-제21조-부당권유금지

# ---------------------------------------------------------------------------
# 1. 대출이자율 일(日) 단위 표시 — 대출이 저렴해 보이도록 오인 유도
# ---------------------------------------------------------------------------
- id: loan_daily_rate_framing
  regulation_id: 금소법-제22조-대출성상품-광고
  description: 대출이자를 "하루 ○○원/○○%"처럼 일 단위로 표시해 저렴한 듯 오인하게 하는 행위
  applies_when:
    # 대출 광고일 때만 발동. 콘텐츠 어디에도 대출 관련 키워드가 없으면 룰 비활성.
    type: any_claim_contains
    patterns:
      - 대출
      - 신용대출
      - 담보대출
      - 자동차대출
      - 한도
      - vay
      - vay tín chấp
      - khoản vay
  check:
    type: must_not_contain_any
    patterns:
      - 하루 단
      - 하루단
      - 하루에 단
      - 하루 이자
      - 일 단위 이자
      - 1일 이자
      - 일이자
      - đồng/ngày
      - đồng một ngày
      - đồng mỗi ngày
      - chỉ ... đồng/ngày
      - lãi mỗi ngày
      - lãi suất theo ngày
  on_hit:
    severity: high
    issue: 대출이자를 일 단위로 표시해 저렴한 것으로 오인하게 하는 표현 (대출성 상품 광고 금지행위)
    suggestion: "일(日) 단위 금액·이율 표시를 제거하고 연이자율(APR)과 적용 조건을 명시"

# ---------------------------------------------------------------------------
# 2. 외국어 콘텐츠의 중요사항 고지 누락 (대출/대고객 권유성 콘텐츠)
#    must_contain_any: 위험·비용·조건 중 하나라도 명시되어야 함.
# ---------------------------------------------------------------------------
- id: loan_mandatory_disclosure_missing
  regulation_id: 금소법-제19조-설명의무
  description: 대출 광고의 위험·비용·조건 등 중요사항 고지 누락 (외국어 콘텐츠에서 특히 치명적)
  applies_when:
    # 대출 광고일 때만 발동. 예금/적금/투자 콘텐츠에는 적용 안 함.
    type: any_claim_contains
    patterns:
      - 대출
      - 신용대출
      - 담보대출
      - 자동차대출
      - 한도
      - vay
      - vay tín chấp
      - vay mua
      - khoản vay
  check:
    type: must_contain_any
    patterns:
      # 한국어
      - 연체이자율
      - 연체 이자율
      - 중도상환수수료
      - 중도 상환 수수료
      - 부대비용
      - 부수비용
      - 연이자율
      - 연 이자율
      - 신용등급에 따라
      - 심사 결과에 따라
      # 베트남어
      - lãi quá hạn
      - lãi suất quá hạn
      - phí trả nợ trước hạn
      - lãi suất năm
      - tuỳ theo thẩm định
      - tùy theo thẩm định
      - điều kiện áp dụng
  on_missing:
    severity: high
    issue: 대출 광고에서 연체이자율·부수비용·심사 조건 등 중요사항 고지가 누락됨 (설명의무 위반 소지 — 특히 외국어 콘텐츠에서 치명적)
    suggestion: "연이자율(APR), 연체이자율, 부수비용(수수료), 심사·신용등급에 따른 차등 등의 중요사항을 콘텐츠 언어로 동등 가시성으로 명시"

# ---------------------------------------------------------------------------
# 3. 단정·과장 표현 (무조건/100%/확정/누구나 승인) — 부당권유 금지
# ---------------------------------------------------------------------------
- id: unconditional_assertion
  regulation_id: 금소법-제21조-부당권유금지
  description: 단정적 판단·확실 오인 표현 또는 누구나 승인되는 듯한 오인 유도 금지
  check:
    type: must_not_contain_any
    patterns:
      # 한국어
      - 무조건
      - 100% 승인
      - 100%승인
      - 누구나 승인
      - 누구나 가능
      - 100% 가능
      - 무심사
      - 확정 금리
      - 반드시 승인
      - 100% 안전
      # 베트남어
      - 100% chấp thuận
      - 100% duyệt
      - 100% được duyệt
      - không cần thẩm định
      - duyệt không điều kiện
      - chắc chắn được vay
      - chắc chắn duyệt
      - tuyệt đối an toàn
      - đảm bảo 100%
  on_hit:
    severity: high
    issue: 단정·과장 표현 — 심사 없이 승인되는 것처럼 오인 유도 또는 확실성 단정 (부당권유 금지)
    suggestion: "‘심사 결과에 따라 한도·금리가 달라질 수 있습니다’ 등 사실 기반 표현으로 완화"

# ---------------------------------------------------------------------------
# 4. 예금 최고 우대금리만 강조 — 우대 조건 미명시 시 오인 소지
# ---------------------------------------------------------------------------
- id: deposit_top_rate_only
  regulation_id: 금소법-제22조-예금성상품-광고
  description: 최고 우대금리만 강조하고 우대 조건을 명시하지 않는 표현 (예금 광고)
  applies_when:
    # 예금/적금 광고일 때만 발동.
    type: any_claim_contains
    patterns:
      - 예금
      - 적금
      - 정기예금
      - 정기적금
      - 자유적금
      - 수신
      - tiết kiệm
      - gửi tiết kiệm
      - kỳ hạn
  check:
    type: must_not_contain_any
    patterns:
      - 최고 연
      - 최고연
      - 연 최고
      - 우대 최고
      - 최고 우대
      - 최고금리
      - 최고 금리
      - lãi suất tối đa
      - lãi suất cao nhất
      - tối đa
  on_hit:
    severity: medium
    issue: 예금 최고 우대금리만 강조 — 우대 조건(급여이체·카드실적·기간 등)이 함께 명시되지 않으면 누구나 최고금리를 받는 것으로 오인할 소지
    suggestion: "기본금리와 우대금리를 구분 표기하고 우대 조건·적용 기간을 동등 가시성으로 병기"

# ---------------------------------------------------------------------------
# 5. 구체 근거 없는 저금리 단정 — 대출성상품 광고 오인 유도
#     "Lãi suất cực thấp", "초저금리" 류는 구체 금리·조건 없이 일반인이
#     누구나 저렴한 금리를 받는 것처럼 오인시킬 소지.
# ---------------------------------------------------------------------------
- id: prohibited_misleading_low_rate_claim
  regulation_id: 금소법-제22조-대출성상품-광고
  description: 구체 금리 범위·적용조건 없는 저금리 강조 표현 금지
  check:
    type: must_not_contain_any
    patterns:
      # 한국어
      - 초저금리
      - 매우 낮은 금리
      - 업계 최저
      - 업계 최저금리
      - 가장 낮은 금리
      # 베트남어
      - lãi suất cực thấp
      - lãi suất thấp nhất
      - lãi suất siêu thấp
  on_hit:
    severity: medium
    issue: 구체 금리 범위·적용조건 없이 일반적으로 저금리가 적용되는 듯한 오인 표현
    suggestion: "‘연이자율 X~Y%, 신용등급·심사 결과에 따라 적용’ 등 구체 금리 범위와 조건을 함께 표기 (외국어 콘텐츠인 경우 해당 언어로 동등 표기)"

# ---------------------------------------------------------------------------
# 6. 광고 필수 안내 누락 — 설명서·약관 안내, 판매업자 정보, 연락처 등
#     (광고 일반 준수사항)
# ---------------------------------------------------------------------------
- id: mandatory_product_provider_disclosure
  regulation_id: 금소법-제22조-광고일반준수사항
  description: 설명서·약관 안내, 판매업자 정보 등 광고 필수 안내 사항이 명시되어 있어야 함
  check:
    type: must_contain_any
    patterns:
      # 한국어 — 약관/설명서 안내, 판매업자 정보, 등록번호
      - 약관
      - 상품설명서
      - 설명서를 확인
      - 가입 전 상품설명서
      - 판매업자
      - 등록번호
      - 준법심의필
      # 베트남어
      - hợp đồng
      - điều khoản
      - bản giới thiệu sản phẩm
      - nhà cung cấp
      - giấy phép
  on_missing:
    severity: medium
    issue: 광고 필수 안내(설명서·약관 안내, 판매업자/등록정보) 누락 — 광고 일반 준수사항 위반 소지
    suggestion: "‘가입 전 상품설명서·약관을 반드시 확인’ 및 판매업자·등록번호를 명시 (외국어 콘텐츠인 경우 해당 언어로 동등 표기)"

# ---------------------------------------------------------------------------
# 7. 사실 근거 없는 긴급성 강조 — 부당권유 금지 (medium)
# ---------------------------------------------------------------------------
- id: urgency_pressure
  regulation_id: 금소법-제21조-부당권유금지
  description: 사실 근거 없는 한정·긴급성 강조로 합리적 판단을 방해하는 표현
  check:
    type: must_not_contain_any
    patterns:
      - 오늘 마감
      - 오늘만
      - 마감 임박
      - 지금 아니면
      - 단 한 번뿐
      - 단 한번뿐
      - đăng ký ngay
      - duy nhất trong năm
      - cơ hội duy nhất
      - chỉ hôm nay
      - sắp hết
  on_hit:
    severity: medium
    issue: 사실 근거가 명시되지 않은 한정·긴급성 강조 표현 (부당권유 — 합리적 판단 방해 소지)
    suggestion: "한정 사유·기한을 사실 근거와 함께 명시하거나 긴급성 강조 표현을 제거"
